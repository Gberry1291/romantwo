{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Romantwo{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

<header class="site-header">
    <div class="logo-row">
        <a href="{% url 'core:home' %}" class="logo-link">
            <img src="{% static 'core/images/logo.png' %}" alt="Romantwo logo" class="site-logo">
        </a>
    </div>

    <div class="nav-row">
        <nav class="anchor-nav" aria-label="Homepage sections">
            <a href="#contact">Contact</a>
            <a href="#sodenkenwir">So denken wir</a>
            <a href="#audio">Jetzt Horen!</a>
            <a href="#about">About</a>
            <a href="#intro">Intro</a>
        </nav>

        <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false">
            <span></span>
            <span></span>
        </button>
    </div>

    <div class="mobile-nav-panel"></div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">

    <div class="footer-inner">

        <p class="footer-label">
            Vernetzen Sie sich mit uns
        </p>

        <div class="footer-links">

            <a href="#"
               target="_blank"
               rel="noopener noreferrer"
               class="linkedin-card">

                <span class="linkedin-name">
                    Roman
                </span>

                <span class="linkedin-icon">
                    <img src="{% static 'core/images/linkdin.png' %}" alt="LinkedIn">
                </span>

            </a>

            <a href="#"
               target="_blank"
               rel="noopener noreferrer"
               class="linkedin-card">

                <span class="linkedin-name">
                    Astrid
                </span>

                <span class="linkedin-icon">
                    <img src="{% static 'core/images/linkdin.png' %}" alt="LinkedIn">
                </span>

            </a>

        </div>

    </div>

</footer>

<script src="{% static 'core/js/nav.js' %}"></script>
<script src="{% static 'core/js/audio-player.js' %}"></script>
</body>
</html>
