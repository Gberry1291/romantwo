{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Romantwo{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

<header class="site-header">
    <div class="logo-row">
        <a href="{% url 'core:home' %}" class="logo-link nav-fade-logo">
            <img src="{% static 'core/images/logo.png' %}" alt="Romantwo logo" class="site-logo">
        </a>
    </div>

    <div class="nav-row">
        {% if request.resolver_match.url_name == "home" %}
            <nav class="anchor-nav" aria-label="Homepage sections">
                <a href="{% url 'core:contact' %}" class="nav-fade-item">Kontact</a>
                <a href="#dastunwir" class="nav-fade-item">Das tun wir</a>
                <a href="#dassindwir" class="nav-fade-item">Das sind wir</a>
                <a href="#angebot" class="nav-fade-item">Unsere Angebote</a>
                <a href="#sodenkenwir" class="nav-fade-item">So denken wir</a>
            </nav>
        {% else %}
            <a href="{% url 'core:home' %}" class="nav-fade-item">Home</a>
        {% endif %}

        <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false">
            <span></span>
            <span></span>
        </button>
    </div>

    <div class="mobile-nav-panel"></div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">

    <div class="footer-inner">

        <p class="footer-label">
            Vernetzen Sie sich mit uns
        </p>

        <div class="footer-links">

            <a href="#"
               target="_blank"
               rel="noopener noreferrer"
               class="linkedin-card">

                <span class="linkedin-name">
                    Roman
                </span>

                <span class="linkedin-icon">
                    <img src="{% static 'core/images/linkdin.png' %}" alt="LinkedIn">
                </span>

            </a>

            <a href="#"
               target="_blank"
               rel="noopener noreferrer"
               class="linkedin-card">

                <span class="linkedin-name">
                    Astrid
                </span>

                <span class="linkedin-icon">
                    <img src="{% static 'core/images/linkdin.png' %}" alt="LinkedIn">
                </span>

            </a>

        </div>

        <a href="mailto:hello@romantwo.ch" class="footer-email">
            Wideblitz@gmail.com
        </a>

    </div>

</footer>

<script src="{% static 'core/js/nav.js' %}"></script>
<script src="{% static 'core/js/audio-player.js' %}"></script>
<script src="{% static 'core/js/page-load.js' %}"></script>
</body>
</html>
